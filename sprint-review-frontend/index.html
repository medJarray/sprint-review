<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprint Review Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; }
    .bg-atlassian-blue { background-color: #0052CC; }
    .bg-atlassian-dark { background-color: #172B4D; }
    .text-atlassian-dark { color: #172B4D; }
    .text-atlassian-blue { color: #0052CC; }
    .bg-atlassian-light { background-color: #F4F5F7; }
    .border-atlassian-blue { border-color: #0052CC; }
    .card-shadow { box-shadow: 0 1px 2px rgba(9, 30, 66, 0.25), 0 0 1px 0 rgba(9, 30, 66, 0.31); }
    .kpi-card { transition: all 0.2s; }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(9, 30, 66, 0.15); }
    .jira-card { box-shadow: 0 1px 2px rgba(9, 30, 66, 0.25), 0 0 1px 0 rgba(9, 30, 66, 0.31); transition: all 0.2s ease; }
    .jira-card:hover { box-shadow: 0 4px 8px rgba(9, 30, 66, 0.25); transform: translateY(-1px); }
    .story-point-badge { background-color: #DFE1E6; color: #172B4D; font-weight: 700; border-radius: 2em; min-width: 24px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; padding: 0 6px; }
    .us-tag { background-color: #E3FCEF; color: #006644; }
    .bug-tag { background-color: #FFEBE6; color: #DE350B; }
    .task-tag { background-color: #DEEBFF; color: #0747A6; }
    .device-frame { border: 8px solid #172B4D; border-radius: 20px; overflow: hidden; background: white; position: relative; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1); }
    .device-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 40%; height: 15px; background: #172B4D; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; z-index: 10; }
    .timeline-line { position: absolute; left: 15px; top: 10px; bottom: 10px; width: 2px; background-color: #EBECF0; z-index: 0; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #F4F5F7; }
    ::-webkit-scrollbar-thumb { background: #C1C7D0; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #A5ADBA; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
