# ansible/roles/common/defaults/main.yml
---
deploy_user: deploy
timezone: Europe/Paris
swap_size: 4G
swap_swappiness: 10

sysctl_settings:
  net.core.somaxconn: 65535
  net.ipv4.tcp_max_syn_backlog: 65535
  vm.max_map_count: 262144
  vm.overcommit_memory: 1
  fs.file-max: 2097152
  fs.inotify.max_user_watches: 524288
  net.ipv6.conf.all.forwarding: 1      # Requis pour K3s dual-stack

packages_common:
  - curl
  - wget
  - git
  - htop
  - iotop
  - jq
  - net-tools
  - dnsutils
  - unzip
  - chrony
  - apt-transport-https
