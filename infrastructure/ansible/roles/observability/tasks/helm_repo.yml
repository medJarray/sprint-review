# ansible/roles/observability/tasks/helm_repo.yml
---
- name: Add Prometheus Community Helm repos
  ansible.builtin.shell: |
    helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  register: helm_repo_add
  changed_when: "'already exists' not in helm_repo_add.stderr"

- name: Add Grafana Helm repo
  ansible.builtin.shell: |
    helm repo add grafana https://grafana.github.io/helm-charts
  register: helm_repo_add_grafana
  changed_when: "'already exists' not in helm_repo_add_grafana.stderr"

- name: Update Helm repos
  ansible.builtin.shell: helm repo update
  changed_when: false