# ansible/roles/k3s_server/tasks/kubeconfig.yml
---
- name: Create .kube directory for deploy user
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/.kube"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0700'

- name: Copy kubeconfig for deploy user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ deploy_user }}/.kube/config"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0600'
    remote_src: true

- name: Fetch kubeconfig to local machine
  ansible.builtin.fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ playbook_dir }}/../../kubeconfigs/{{ env_name }}-kubeconfig.yaml"
    flat: true
  tags: [kubeconfig, fetch]

- name: Fix kubeconfig server address (local copy)
  ansible.builtin.replace:
    path: "{{ playbook_dir }}/../../kubeconfigs/{{ env_name }}-kubeconfig.yaml"
    regexp: '127\.0\.0\.1'
    replace: "{{ ipv4_address }}"
  delegate_to: localhost
  become: false
  tags: [kubeconfig, fetch]
