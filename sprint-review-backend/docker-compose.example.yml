version: '3.8'

services:
  # ─── MongoDB ───
  mongodb:
    image: mongo:7
    container_name: sprint-review-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: CHANGE_ME
      MONGO_INITDB_DATABASE: sprint-review
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - sprint-network

  # ─── Mongo Express (UI Web pour MongoDB) ───
  mongo-express:
    image: mongo-express:1
    container_name: sprint-review-mongo-ui
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: CHANGE_ME
      ME_CONFIG_MONGODB_URL: mongodb://admin:CHANGE_ME@mongodb:27017/
      ME_CONFIG_BASICAUTH: 'false'
    depends_on:
      - mongodb
    networks:
      - sprint-network

  # ─── MinIO S3 ───
  minio:
    image: minio/minio:latest
    container_name: sprint-review-minio
    restart: unless-stopped
    ports:
      - '9000:9000'   # API S3
      - '9001:9001'   # Console Web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: CHANGE_ME
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - sprint-network
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Création automatique du bucket par défaut ───
  minio-init:
    image: minio/mc:latest
    container_name: sprint-review-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin CHANGE_ME;
        mc mb local/sprint-review-attachments --ignore-existing;
        mc anonymous set download local/sprint-review-attachments;
        echo 'Bucket sprint-review-attachments prêt';
      "
    networks:
      - sprint-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  minio_data:
    driver: local

networks:
  sprint-network:
    driver: bridge
