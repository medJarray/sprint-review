# ═══════════════════════════════════════════════════════════════════════════
# FICHIER : .github/workflows/frontend-ci.yml
# RÔLE   : Builder et déployer le frontend React/Vite
# QUAND  : Push ou PR qui touche sprint-review-frontend/
# ═══════════════════════════════════════════════════════════════════════════

name: Frontend CI/CD

on:
  push:
    branches: [develop]
    paths:
      - 'sprint-review-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'sprint-review-frontend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sprint-review-frontend

jobs:

  # ──────────────────────────────────────────────────────────────────
  # Lint (facultatif — ne bloque pas le pipeline si absent ou en échec)
  # ──────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true          # ← Échec toléré, ne bloque pas
    defaults:
      run:
        working-directory: sprint-review-frontend/
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sprint-review-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint (optional)
        run: npm run lint --if-present   # ← S'exécute seulement si le script "lint" existe

  # ──────────────────────────────────────────────────────────────────
  # Tests (facultatif — ne bloque pas le pipeline si absent ou en échec)
  # ──────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    continue-on-error: true          # ← Échec toléré, ne bloque pas
    defaults:
      run:
        working-directory: sprint-review-frontend/
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sprint-review-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (optional)
        run: npm test --if-present       # ← S'exécute seulement si le script "test" existe

  # ──────────────────────────────────────────────────────────────────
  # Build (obligatoire — doit passer pour continuer)
  # ──────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sprint-review-frontend/

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sprint-review-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint, test, build]       # ← Attend les 3, mais seul build est bloquant
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      contents: write
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: sprint-review-frontend/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitOps repo with new image tag
        run: |
          cd gitops/overlays/dev
          sed -i "s|newTag: .*  # frontend|newTag: ${{ needs.build-and-push.outputs.image-tag }}  # frontend|" kustomization.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/
          git diff --staged --quiet || git commit -m "chore(gitops): update frontend to ${{ needs.build-and-push.outputs.image-tag }}"
          git push
