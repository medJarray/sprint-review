# .github/workflows/infra-plan.yml
name: Terraform Plan

on:
  push:
    branches: [develop]
    paths:
      - 'infrastructure/terraform/**'
      - 'infrastructure/ansible/**'
      - '.github/workflows/infra-plan.yml'
  
  pull_request:
    paths:
      - 'infrastructure/terraform/**'
      - 'infrastructure/ansible/**'
      - '.github/workflows/infra-plan.yml'
  workflow_dispatch:          # ← Déclenchement manuel depuis GitHub

env:
  TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}

jobs:
  # ──────────────────────────────
  # Security Scan
  # ──────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        run: |
          wget -q https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 -O tfsec
          chmod +x tfsec
          ./tfsec infrastructure/terraform/

      - name: Run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/terraform/
          framework: terraform

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"

  # ──────────────────────────────
  # Terraform Plan
  # ──────────────────────────────
  plan:
    runs-on: ubuntu-latest
    needs: security-scan
    strategy:
      matrix:
        environment: [dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: terraform init

      - name: Terraform Plan
        id: plan                          # ← id nécessaire pour récupérer l'output
        working-directory: infrastructure/terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan -var-file=terraform.tfvars -no-color 2>&1 | tee plan.txt
          echo "PLAN<<EOF" >> $GITHUB_ENV
          cat plan.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan - ${{ matrix.environment }}
            \`\`\`hcl
            ${process.env.PLAN}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # ──────────────────────────────
  # Ansible Lint
  # ──────────────────────────────
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ansible-lint with compatible deps
        run: pip install "ansible-core>=2.17,<2.18" "ansible-lint>=24.0,<25.0"

      - name: Run ansible-lint
        working-directory: infrastructure/ansible/
        run: ansible-lint