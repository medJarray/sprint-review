# ═══════════════════════════════════════════════════════════════════════════
# FICHIER : .github/workflows/backend-ci.yml
# RÔLE   : Tester, builder et déployer le backend NestJS
# QUAND  : Push ou PR qui touche sprint-review-backend/
# ═══════════════════════════════════════════════════════════════════════════

name: Backend CI/CD

on:
  push:
    branches: [develop]
    paths:
      - 'sprint-review-backend/**'
      - '.github/workflows/backend-ci.yml'   # ← Auto-trigger on workflow changes
  pull_request:
    branches: [develop]
    paths:
      - 'sprint-review-backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sprint-review-backend

jobs:

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sprint-review-backend/
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: sprint-review-backend/yarn.lock

      - name: Install dependencies and cache
        run: yarn install --frozen-lockfile

      - name: Run lint
        run: yarn lint

      - name: Run tests
        run: yarn test  

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push' # Only build/push on direct pushes to develop
    permissions:
      contents: write
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,prefix=
            type=raw,value=latest
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: sprint-review-backend/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
  update-gitops:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitOps repo with new image tag
        run: |
          cd gitops/overlays/dev
          sed -i "s|newTag: .*  # backend|newTag: ${{ needs.build-push.outputs.image-tag }}  # backend|" kustomization.yaml
        
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/
          git diff --staged --quiet || git commit -m "chore(gitops): update backend to ${{ needs.build-push.outputs.image-tag }}"
          git push